services:
  traefik:
    restart: unless-stopped

  api:
    image: ghcr.io/jeremyarancio/vps-deployment-api:latest
    deploy:
      replicas: 3
    labels:
      # Rate limiting: 50 req/s average, allows bursts up to 100
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=50"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=100"
      # Prevents clickjacking by blocking iframe embedding
      - "traefik.http.middlewares.api-headers.headers.frameDeny=true"
      # Tells older browsers to block reflected XSS attempts
      - "traefik.http.middlewares.api-headers.headers.browserXssFilter=true"
      # Prevents browsers from MIME-sniffing a response away from the declared content type
      - "traefik.http.middlewares.api-headers.headers.contentTypeNosniff=true"
      # Apply middlewares
      - "traefik.http.routers.api.middlewares=api-ratelimit,api-headers"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --rolling-restart
      - --interval
      - "120"
    environment:
      - REPO_USER=${GH_USER}
      - REPO_PASS=${GH_PASSWORD}
      - DOCKER_API_VERSION=1.53 #Bug with watchtower (https://github.com/containrrr/watchtower/issues/2126)
